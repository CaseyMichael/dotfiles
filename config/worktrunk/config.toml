[pre-switch]
fetch = """
echo "🔍 Checking if git fetch is needed..."
FETCH_HEAD="$(git rev-parse --git-common-dir)/FETCH_HEAD"
if [ "$(find "$FETCH_HEAD" -mmin +360 2>/dev/null)" ] || [ ! -f "$FETCH_HEAD" ]; then
    echo "📡 Fetching latest changes from remote..."
    git fetch
    echo "✓ Fetch complete"
else
    echo "✓ Repository is up to date (fetched within last 6 hours)"
fi
"""

[[pre-start]]
setup = """
echo "🔧 Allowing direnv for {{ branch }}..."
direnv allow
"""

[[pre-start]]
install = """
echo "📦 Installing dependencies..."
pnpm install
"""

[[pre-start]]
bootstrap = """
echo "📦 Bootstrapping dependencies..."
pnpm bootstrap
"""

[[pre-start]]
copy-env = """
echo "📋 Copying .env files from main worktree_path..."
cd {{ primary_worktree_path }}
find apps -name '.env' -type f | while read -r file; do
    echo "  → Copying $file"
    mkdir -p "{{ worktree_path }}/$(dirname "$file")"
    cp "$file" "{{ worktree_path }}/$file"
done
echo "✓ Environment files copied"
"""

[post-switch]
tmux = """
if [ -n "$TMUX" ]; then
    echo "🪟 Renaming tmux window to {{ branch | sanitize }}..."
    tmux rename-window {{ branch | sanitize }}
fi
"""

[post-remove]
overmind = """
echo "🔍 Checking for running overmind process..."
if [ -S .overmind.sock ]; then
    echo "🛑 Stopping overmind..."
    overmind quit
    echo "✓ Overmind stopped"
else
    echo "✓ No overmind process running"
fi
"""
