# global settings
set -g mouse on

# Override tmux tokyo night to put status bar at bottom
set -g @powerkit_status_position 'bottom'

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @plugin 'eduwass/tmux-palette'
set -g @plugin 'liberatoaguilar/tmux-superchat'

# tmux-palette settings
set -g @palette-key 'C-Space'             # optional, default: C-Space (no-prefix)
set -g @palette-find-pane-key 'M-f'       # optional, no binding by default
set -g @palette-move-pane-key 'M-m'       # optional, no binding by default

# tmux-continuum settings
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# Optional: show a brief visual cue when prefix is pressed
set -g status on
set -g status-interval 1
set -g status-left-length 20
set -g status-left "#[fg=green]PREFIX: #[default]#{?client_prefix,ON,OFF}"

# Format: Mon, 16, 7:51 PM  (3-letter month, 2-digit day, comma, hour:minute AM/PM)
set -g status-right '#{t:%b, %d, %l:%M %p}'

# tmux index settings
set -g base-index 1        # windows start at 1
set -g pane-base-index 1   # panes start at 1

#set default shell
set-option -g default-shell $SHELL
set-option -g default-command "$SHELL -l" 

# https://github.com/3rd/image.nvim?tab=readme-ov-file#tmux setup
set -gq allow-passthrough on
set -g visual-activity off

# tmux-superchat
set -g @superchat-poll-s 0.05
